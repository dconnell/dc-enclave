# DC Enclave CI
#
# Five jobs, all required to merge to main:
#   contract / lint / unit  - fast bash tiers, matrixed on Linux + macOS
#   integration-linux       - real docker + podman + colima backends
#   integration-windows     - real docker + podman via WSL2
#
# The integration suite refuses to run inside a container
# (tests/integration/lib/backend-discovery.sh:36 -> it_assert_not_in_container),
# so integration jobs install real runtimes on the bare host and never use the
# `container:` key or service containers.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# Standard hosted runners for a public repository keep CI at zero cost.
permissions:
  contents: read

# Cancel superseded runs on the same ref (but never cancel main).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ---------------------------------------------------------------------------
  # Fast tiers. OS-agnostic bash. Matrixed on Linux + macOS so the macOS bash
  # orchestration path is exercised; Windows is excluded because WSL2 runs the
  # same Ubuntu bash as Linux (no added tier signal).
  # ---------------------------------------------------------------------------
  contract:
    name: contract (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup-tier
      - name: Run contract tier
        run: tests/contract/run-all.sh

  lint:
    name: lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup-tier
        with:
          shellcheck: "true"
      - name: Run lint tier
        run: tests/lint/run-all.sh

  unit:
    name: unit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup-tier
      - name: Run unit tier
        run: tests/unit/run-all.sh

  # ---------------------------------------------------------------------------
  # Real-backend integration on Linux, split into one PARALLEL job per backend
  # (docker / podman / colima) via a matrix. Each job installs only what its
  # backend needs, restores its OWN dce-base cache entry, and runs the suite
  # against that single backend. There is deliberately NO serial "build base
  # first" gate: the per-backend cache key (Containerfile.base + backend) gives
  # build-once/reuse across runs, and on a public repo a parallel cold rebuild
  # is free -- serializing would only delay the warm (common) path.
  #
  #   docker  - preinstalled; no extra setup
  #   podman  - apt + rootless subuid/subgid
  #   colima  - release binary (NOT in Ubuntu apt) + QEMU, KVM-accelerated VM
  # ---------------------------------------------------------------------------
  integration-linux:
    name: integration-linux (${{ matrix.backend }})
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        backend: [docker, podman, colima]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Install backend (${{ matrix.backend }})
        run: |
          case "${{ matrix.backend }}" in
            docker)
              docker info
              ;;
            podman)
              # ubuntu-24.04 (noble) caps podman at 4.9.3, whose imagebuilder
              # parser mishandles heredocs in RUN. Pull a current 5.x from a
              # newer Ubuntu release (plucky/25.04) instead. Pin that release low
              # so it only supplies packages explicitly requested with -t plucky,
              # leaving the noble base otherwise untouched. plucky is interim and
              # may have moved to old-releases after EOL, so probe the host.
              if curl -fsSL "http://archive.ubuntu.com/ubuntu/dists/plucky/Release" >/dev/null 2>&1; then
                repo_host="archive.ubuntu.com/ubuntu"
              else
                repo_host="old-releases.ubuntu.com/ubuntu"
              fi
              echo "deb http://$repo_host plucky main universe" \
                | sudo tee /etc/apt/sources.list.d/plucky.list >/dev/null
              printf 'Package: *\nPin: release n=plucky\nPin-Priority: 100\n' \
                | sudo tee /etc/apt/preferences.d/plucky >/dev/null
              sudo apt-get update
              sudo apt-get install -y uidmap
              # Pull podman AND its runtime/networking stack together from plucky:
              # mixing plucky podman with noble's crun/libseccomp2 fails with an
              # ABI mismatch ("unknown version specified"), so pull crun, conmon,
              # and libseccomp2 from plucky too. passt/slirp4netns keep rootless
              # container networking current. (Rootless podman still cannot
              # live-attach a running container to a network with --ip regardless
              # of passt version -- that case is skipped in the suite.)
              # (containers-common is a Fedora package name; Ubuntu's podman
              # bundles that config, so it is not installed separately.)
              sudo apt-get install -y -t plucky podman crun conmon libseccomp2 passt slirp4netns
              podman --version
              # dce drives `podman` without sudo, so rootless podman must work
              # for the runner user. Idempotent: only add subuid/subgid if absent.
              user="$(id -un)"
              grep -q "^${user}:" /etc/subuid \
                || sudo usermod --add-subuids 100000-165535 --add-subgids 100000-165535 "$user"
              podman info >/dev/null
              ;;
            colima)
              # Colima runs a Lima VM on QEMU; hosted Linux runners expose KVM,
              # so the nested VM is hardware-accelerated. Do NOT `docker context
              # use colima` globally -- the suite pins the Colima context per
              # backend call, and a globally-active one breaks the docker backend.
              sudo apt-get update
              sudo apt-get install -y qemu-system qemu-utils
              # Colima on Linux drives Lima but does NOT bundle limactl (the
              # macOS brew formula pulls lima as a dep; the standalone binary
              # does not), so install lima from its releases too. Install the
              # WHOLE tarball (bin/ + share/lima/templates/ + libexec/) into
              # /usr/local, not just the binaries: limactl looks up its templates
              # relative to the binary, so binaries alone fail with
              # `template "default.yaml" not found`. The asset name is versioned,
              # so resolve the latest tag first (bash regex, to avoid a noisy pipe).
              lima_json="$(curl -fsSL https://api.github.com/repos/lima-vm/lima/releases/latest)"
              lima_re='"tag_name":[[:space:]]*"([^"]+)"'
              if ! [[ "$lima_json" =~ $lima_re ]]; then
                echo "ERROR: could not parse lima latest release tag" >&2
                exit 1
              fi
              lima_tag="${BASH_REMATCH[1]}"
              lima_ver="${lima_tag#v}"
              curl -fsSL -o lima.tgz \
                "https://github.com/lima-vm/lima/releases/download/${lima_tag}/lima-${lima_ver}-Linux-x86_64.tar.gz"
              sudo tar -xzf lima.tgz -C /usr/local
              rm -f lima.tgz
              limactl --version
              curl -fsSL -o colima \
                https://github.com/abiosoft/colima/releases/latest/download/colima-Linux-x86_64
              sudo install -m 0755 colima /usr/local/bin/colima
              # Ensure the runner user can use /dev/kvm: if QEMU cannot access KVM
              # it exits at launch and lima's hostagent panics ("send on closed
              # channel") while waiting for SSH.
              sudo chmod 666 /dev/kvm 2>/dev/null || true
              if ! colima start --runtime docker --cpu 2 --memory 2 --disk 10; then
                # The nested-VM boot error is otherwise trapped on the ephemeral
                # runner; dump colima's serial + hostagent logs to the job output
                # so the cause (KVM, firmware, OOM, ...) is visible without a rerun.
                echo "===== colima serial/hostagent logs (start failed) ====="
                shopt -s nullglob
                for f in "$HOME"/.config/colima/_lima/colima/serial*.log \
                         "$HOME"/.config/colima/_lima/colima/ha*.log; do
                  echo "----- $f -----"
                  cat "$f" 2>/dev/null || true
                done
                shopt -u nullglob
                echo "===== end colima logs ====="
                exit 1
              fi
              ;;
          esac

      - name: Restore dce-base cache (${{ matrix.backend }})
        id: cache
        uses: actions/cache@v6
        with:
          path: /tmp/dce-base
          # Per-backend key: an immutable cache key can't be appended to by
          # parallel jobs, so each backend owns its own entry (its image lives
          # in its own store anyway). Containerfile.base in the hash => a recipe
          # change rebuilds. 7-day-since-last-access retention, 10 GB repo quota.
          key: dce-base-${{ runner.os }}-${{ runner.arch }}-${{ matrix.backend }}-${{ hashFiles('Containerfiles/Containerfile.base') }}

      - name: Load cached dce-base
        run: |
          archive="/tmp/dce-base/${{ matrix.backend }}.tar"
          [[ -f "$archive" ]] || exit 0
          case "${{ matrix.backend }}" in
            docker) docker load -i "$archive" ;;
            podman) podman load -i "$archive" ;;
            colima) DOCKER_CONTEXT=colima docker load -i "$archive" ;;
          esac

      - name: Run integration (${{ matrix.backend }})
        env:
          INTEGRATION_BACKENDS: ${{ matrix.backend }}
          INTEGRATION_MODE: full
          # colima's docker socket/context AND podman's rootless image store are
          # HOME-relative, so run those backends under the real HOME -- matching
          # the separate cache load/save steps, which run under the real HOME --
          # instead of the suite's isolated one. (docker's store is system-wide,
          # so it stays hermetic.) Without this, podman's dce-base is built into
          # the isolated home's store and the save step can't find it.
          DCE_TEST_REAL_HOME: ${{ (matrix.backend == 'colima' || matrix.backend == 'podman') && '1' || '0' }}
        run: tests/integration/run-all.sh

      - name: Save dce-base (only on cache miss)
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/dce-base
          archive="/tmp/dce-base/${{ matrix.backend }}.tar"
          case "${{ matrix.backend }}" in
            docker) docker save dce-base:latest -o "$archive" ;;
            podman) podman save -o "$archive" dce-base:latest ;;
            colima) DOCKER_CONTEXT=colima docker save dce-base:latest -o "$archive" ;;
          esac

      # Per-case logs land on the ephemeral runner and are otherwise lost; upload
      # them on failure so integration failures are diagnosable without reruns.
      - name: Upload integration logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: integration-${{ matrix.backend }}-${{ github.run_id }}
          path: tests/integration/artifacts/
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Real-backend integration on Windows: docker + podman, both via WSL2 (no
  # Colima/OrbStack/apple on Windows). REQUIRED. Split into one PARALLEL job per
  # backend (mirrors integration-linux) so a slow/failed podman leg never masks
  # docker signal and each leg reports its own status check.
  #
  # Bootstrap: Vampire/setup-wsl imports the Ubuntu-24.04 rootfs (no Microsoft
  # Store dependency -- `wsl --install -d` does NOT work headless on Windows
  # Server / GHA runners) and exposes a `wsl-bash` shell so each step runs
  # natively inside WSL. Ubuntu-24.04 matches the ubuntu-24.04 Linux runner and
  # the dce-base image, so all CI legs share one userspace.
  #
  #   docker leg: docker.io installed via setup-wsl; dockerd launched directly
  #     (WSL has no systemd, so `service docker start` is unreliable).
  #   podman leg: noble's apt caps podman at 4.9.3, whose imagebuilder parser
  #     mishandles Containerfile heredocs (splits a `<<'EOF'` block into separate
  #     instructions -> "Unknown instruction: ALIAS"; Containerfile.base:44).
  #     podman 5.x is pulled from a newer Ubuntu (plucky/25.04) instead -- the
  #     SAME workaround the Linux podman job uses, adapted to run as root in WSL
  #     (no sudo).
  #
  # jq is installed for BOTH legs: `dce config sync-vscode` hard-requires it
  # (it is optional everywhere else), and the minimal WSL rootfs ships none.
  #
  # The repo is cloned fresh INSIDE WSL (Linux git -> LF preserved, files on the
  # WSL ext4 filesystem) rather than using the Windows checkout, which avoids
  # CRLF shebang corruption and /mnt/c bind-mount slowness. refs/pull/<n>/merge
  # exists on the base repo even for fork PRs, so the same clone works for push
  # and pull_request triggers. dce-base is cached per backend (mirrors
  # integration-linux), shuttling the image archive through the WSL /mnt mount.
  # ---------------------------------------------------------------------------
  integration-windows:
    name: integration-windows (${{ matrix.backend }}${{ matrix.shard_label }})
    runs-on: windows-2022
    # Podman-on-WSL2 is markedly slower than docker (daemonless: every `podman`
    # call re-parses config + re-opens storage + spawns conmon, and the suite
    # shells out hundreds of times). Podman is split into TWO parallel shards
    # (cases divided by stable modulo) so each leg lands near ~1h instead of one
    # ~2h run; docker is fast enough to run whole. Timeout is a uniform 90m across
    # all integration jobs (docker previously timed out at 60m); the per-shard
    # split keeps podman well under budget.
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: docker
            shard_index: 0
            shard_total: 1
            shard_label: ""
          - backend: podman
            shard_index: 0
            shard_total: 2
            shard_label: " 1/2"
          - backend: podman
            shard_index: 1
            shard_total: 2
            shard_label: " 2/2"
    env:
      # Forwarded into every WSL step via WSLENV: DC_* for the clone, and
      # GITHUB_WORKSPACE so the cache save/load steps can translate it to its
      # WSL /mnt mount for the image archive. Shard vars drive the modulo split.
      WSLENV: "DC_REPO_URL:DC_REF:DC_SHA:GITHUB_WORKSPACE:INTEGRATION_LOGS_FOLLOW_TIMEOUT:INTEGRATION_SHARD_INDEX:INTEGRATION_SHARD_TOTAL"
      DC_REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
      DC_REF: ${{ github.ref }}
      DC_SHA: ${{ github.sha }}
      INTEGRATION_LOGS_FOLLOW_TIMEOUT: ${{ matrix.backend == 'podman' && '10' || '4' }}
      INTEGRATION_SHARD_INDEX: ${{ matrix.shard_index }}
      INTEGRATION_SHARD_TOTAL: ${{ matrix.shard_total }}
    steps:
      # Give WSL2 more RAM before its VM first starts: WSL2 defaults to ~50% of
      # host RAM (~8 GB of the 16 GB Windows runner), and dockerd + containers +
      # the dce-base image can exceed that, paging to a swap.vhdx on the same
      # slow disk and slowing everything uniformly. Native Linux has the full
      # 16 GB. .wslconfig is read at VM start, so write it (and shut down any
      # pre-started VM) BEFORE setup-wsl launches the distro.
      - name: Tune WSL2 memory (.wslconfig)
        shell: bash
        run: |
          printf '[wsl2]\nmemory=12GB\nswap=2GB\n' > "$USERPROFILE/.wslconfig"
          wsl --shutdown || true

      # Shallow Windows-side checkout SOLELY so hashFiles('Containerfile.base')
      # resolves for the dce-base cache key below. The suite itself runs from a
      # fresh clone INSIDE WSL (LF-preserved, ext4) -- this checkout is never
      # executed, only hashed.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      # dce-base image cache, per backend (mirrors integration-linux). The cache
      # lives on the Windows side; the save/load steps shuttle the image archive
      # between the Windows workspace and WSL via its /mnt mount. Cold runs
      # rebuild dce-base in-preflight; warm runs load it and skip the build.
      - name: Restore dce-base cache (${{ matrix.backend }})
        id: cache
        uses: actions/cache@v6
        with:
          path: dce-base-${{ matrix.backend }}.tar
          key: dce-base-${{ runner.os }}-${{ runner.arch }}-${{ matrix.backend }}-${{ hashFiles('Containerfiles/Containerfile.base') }}

      # Install Ubuntu-24.04 in WSL2 (rootfs import -- no Store dependency).
      # Common packages: curl (plucky-release probe in the podman leg), git
      # (clone), jq (config sync-vscode), ca-certificates. The docker leg adds
      # docker.io; the podman leg installs podman 5.x separately below (noble's
      # 4.9.3 is broken for this repo's Containerfiles). Run as root (matches
      # the former `wsl -u root` path): the docker socket needs no group
      # juggling and podman runs rootful.
      - name: Setup WSL (Ubuntu-24.04 + tooling)
        uses: Vampire/setup-wsl@v7
        with:
          distribution: Ubuntu-24.04
          set-as-default: 'true'
          wsl-shell-user: root
          additional-packages: ca-certificates curl git jq

      # podman leg only: pull podman 5.x from plucky. Running as root in WSL, so
      # no sudo. plucky is interim and may have moved to old-releases after EOL,
      # so probe the host first.
      - name: Install podman 5.x (plucky) inside WSL
        if: matrix.backend == 'podman'
        shell: wsl-bash {0}
        run: |
          set -euxo pipefail
          if curl -fsSL "http://archive.ubuntu.com/ubuntu/dists/plucky/Release" >/dev/null 2>&1; then
            repo_host="archive.ubuntu.com/ubuntu"
          else
            repo_host="old-releases.ubuntu.com/ubuntu"
          fi
          echo "deb http://$repo_host plucky main universe" \
            > /etc/apt/sources.list.d/plucky.list
          printf 'Package: *\nPin: release n=plucky\nPin-Priority: 100\n' \
            > /etc/apt/preferences.d/plucky
          apt-get update
          apt-get install -y uidmap
          # Pull podman AND its runtime/networking stack together from plucky:
          # mixing plucky podman with noble's crun/libseccomp2 fails with an ABI
          # mismatch, so pull crun, conmon, and libseccomp2 from plucky too.
          apt-get install -y -t plucky podman crun conmon libseccomp2 passt slirp4netns
          podman --version
          # dce drives podman without sudo; rootful here, but seed subuid/subgid
          # so a rootless path (if any) does not silently break.
          user="$(id -un)"
          grep -q "^${user}:" /etc/subuid \
            || usermod --add-subuids 100000-165535 --add-subgids 100000-165535 "$user"
          podman info >/dev/null

      # Ubuntu's docker.io ships a CLI WITHOUT buildx subcommand support, and
      # no amount of installing the standalone buildx binary makes docker.io's
      # CLI discover it (neither PATH-based nor cli-plugins-dir discovery works).
      # Install Docker CE instead -- its CLI has full buildx support built in,
      # which dce needs (DOCKER_BUILDKIT=1 for heredoc Containerfiles). Docker CE
      # also provides dockerd, so the runtime-start logic in the next step works
      # unchanged. docker leg only; podman has its own builder.
      - name: Install Docker CE inside WSL (bundles buildx; docker leg only)
        if: matrix.backend == 'docker'
        shell: wsl-bash {0}
        run: |
          set -euo pipefail
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
            | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
          chmod a+r /etc/apt/keyrings/docker.gpg
          . /etc/os-release
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu ${UBUNTU_CODENAME} stable" \
            > /etc/apt/sources.list.d/docker.list
          apt-get update
          apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin
          docker buildx version

      - name: Clone repo + start runtime (inside WSL)
        shell: wsl-bash {0}
        run: |
          set -euxo pipefail
          rm -rf "$HOME/dce"
          git clone --no-checkout "$DC_REPO_URL" "$HOME/dce"
          git -C "$HOME/dce" fetch --depth 1 origin "$DC_REF"
          git -C "$HOME/dce" checkout "$DC_SHA"
          case "${{ matrix.backend }}" in
            docker)
              # WSL ships no systemd, so launch dockerd directly and wait for the
              # socket. Idempotent: a no-op if dockerd already answers.
              docker info >/dev/null 2>&1 || {
                mkdir -p /tmp/dockerd
                nohup dockerd >/tmp/dockerd.log 2>&1 &
                for i in $(seq 1 60); do docker info >/dev/null 2>&1 && break; sleep 1; done
              }
              docker info >/dev/null
              # DIAGNOSTIC + FIX: the vfs storage driver has no copy-on-write and
              # is catastrophically slow on WSL2 -- a prime suspect for the
              # per-case slowdown. If dockerd fell back to vfs, restart it on
              # overlay2. The data-root is empty at this point (no images yet),
              # so a clean restart is safe.
              drv="$(docker info -f '{{.Driver}}' 2>/dev/null || true)"
              echo "docker storage driver (default): $drv"
              if [ "$drv" = "vfs" ]; then
                [ -f /var/run/docker.pid ] && kill "$(cat /var/run/docker.pid)" 2>/dev/null || true
                for i in $(seq 1 20); do docker info >/dev/null 2>&1 || break; sleep 1; done
                nohup dockerd --storage-driver=overlay2 >/tmp/dockerd.log 2>&1 &
                for i in $(seq 1 60); do docker info >/dev/null 2>&1 && break; sleep 1; done
                echo "docker storage driver (forced): $(docker info -f '{{.Driver}}' 2>/dev/null || true)"
              fi
              docker info >/dev/null
              ;;
            podman)
              # DIAGNOSTIC: print podman's storage driver. overlay is the fast
              # default; vfs would be pathologically slow. If it landed on vfs,
              # force overlay via the system storage config and re-init storage.
              drv="$(podman info --format '{{.Store.GraphDriverName}}' 2>/dev/null || true)"
              echo "podman storage driver (default): $drv"
              if [ "$drv" = "vfs" ]; then
                podman system reset -f >/dev/null 2>&1 || true
                printf '[storage]\ndriver = "overlay"\nrunroot = "/var/run/containers/storage"\ngraphroot = "/var/lib/containers/storage"\n' > /etc/containers/storage.conf
                echo "podman storage driver (forced): $(podman info --format '{{.Store.GraphDriverName}}' 2>/dev/null || true)"
              fi
              podman info >/dev/null
              ;;
          esac

      - name: Load cached dce-base (inside WSL)
        shell: wsl-bash {0}
        run: |
          set -euo pipefail
          # Translate the Windows workspace to its WSL /mnt mount, where the
          # cache action restored the image archive.
          win_ws="$(printf '%s' "$GITHUB_WORKSPACE" | sed 's|\\|/|g; s|^\([A-Za-z]\):|/mnt/\L\1|')"
          tar="$win_ws/dce-base-${{ matrix.backend }}.tar"
          [ -f "$tar" ] || { echo "no cached dce-base; preflight will build it"; exit 0; }
          ${{ matrix.backend }} load -i "$tar"

      - name: Run integration (${{ matrix.backend }}) inside WSL
        shell: wsl-bash {0}
        run: |
          set -euxo pipefail
          cd "$HOME/dce"
          # Put the suite workspace on tmpfs (RAM): it does hundreds of small
          # writes (config/secrets/SSH keys/repos bind-mounts, plus the isolated
          # HOME) to /tmp/dce-integration on the VHDX; tmpfs removes that per-op
          # disk latency. The image store stays on disk (overlay2), so the cached
          # dce-base is unaffected. size is a cap, not a pre-allocation.
          mkdir -p /tmp/dce-integration
          mount -t tmpfs -o size=4g tmpfs /tmp/dce-integration
          # Diagnostic: memory + swap. Heavy swap would mean WSL2 is still under
          # provisioned even after the .wslconfig bump (memory=12GB) above.
          free -h
          case "${{ matrix.backend }}" in
            docker)
              # Re-ensure dockerd is up: WSL may idle-shut the VM between steps.
              # Pin overlay2 on restart (the clone step already moved off vfs).
              docker info >/dev/null 2>&1 || {
                mkdir -p /tmp/dockerd
                nohup dockerd --storage-driver=overlay2 >/tmp/dockerd.log 2>&1 &
                for i in $(seq 1 60); do docker info >/dev/null 2>&1 && break; sleep 1; done
              }
              docker info >/dev/null
              ;;
          esac
          export INTEGRATION_BACKENDS=${{ matrix.backend }}
          export INTEGRATION_MODE=full
          tests/integration/run-all.sh

      # Persist the freshly-built dce-base back to the Windows workspace so the
      # cache action's post step can store it. Only on a cache miss (the image
      # is otherwise unchanged). Mirrors integration-linux's save step.
      - name: Save dce-base (only on cache miss)
        if: steps.cache.outputs.cache-hit != 'true'
        shell: wsl-bash {0}
        run: |
          set -euo pipefail
          win_ws="$(printf '%s' "$GITHUB_WORKSPACE" | sed 's|\\|/|g; s|^\([A-Za-z]\):|/mnt/\L\1|')"
          ${{ matrix.backend }} save dce-base:latest -o "$win_ws/dce-base-${{ matrix.backend }}.tar"

      # Per-case logs live in the WSL ext4 filesystem; pull them out via a tar
      # pipe (drive-letter independent) so upload-artifact -- a Windows-side
      # action -- can read them. Mirrors the Linux integration jobs' failure
      # upload so WSL failures are diagnosable without a rerun.
      - name: Stage WSL integration artifacts on failure
        if: failure()
        shell: bash
        run: |
          mkdir -p artifacts
          wsl bash -c 'tar -C "$HOME/dce/tests/integration/artifacts" -cf - .' 2>/dev/null \
            | tar -xf - -C artifacts || true
      - name: Upload integration logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: integration-windows-${{ matrix.backend }}-${{ github.run_id }}
          path: artifacts/
          if-no-files-found: ignore
